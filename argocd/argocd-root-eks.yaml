apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app-eks
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Magdywalid/k8s-gitops.git
    targetRevision: main
    path: argocd/apps/eks
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
