apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  microservices-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "content": "# Microservices Dashboard\nSelect a Namespace and Service to view specific metrics.",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "id": 16,
          "mode": "markdown",
          "title": "",
          "type": "text"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 3 },
          "id": 2,
          "title": "Requests per Second",
          "type": "graph",
          "targets": [
            { "expr": "sum(rate(http_requests_total{kubernetes_namespace=\"$namespace\", app=\"$service\"}[1m])) OR sum(rate(microsoft_aspnetcore_hosting_http_server_request_duration_bucket{kubernetes_namespace=\"$namespace\", app=\"$service\", le=\"+Inf\"}[1m]))", "legendFormat": "HTTP RPS" },
            { "expr": "sum(rate(grpc_server_handled_total{kubernetes_namespace=\"$namespace\", app=\"$service\"}[1m])) OR sum(rate(grpc_io_server_completed_rpcs{kubernetes_namespace=\"$namespace\", app=\"$service\"}[1m]))", "legendFormat": "gRPC RPS" }
          ]
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 3 },
          "id": 4,
          "title": "Error Rate",
          "type": "graph",
          "targets": [
             { "expr": "sum(rate(http_requests_total{kubernetes_namespace=\"$namespace\", app=\"$service\", code=~\"5..\"}[1m])) OR sum(rate(microsoft_aspnetcore_hosting_http_server_request_duration_bucket{kubernetes_namespace=\"$namespace\", app=\"$service\", code=~\"5..\", le=\"+Inf\"}[1m]))", "legendFormat": "HTTP 5xx" },
             { "expr": "sum(rate(grpc_server_handled_total{kubernetes_namespace=\"$namespace\", app=\"$service\", grpc_code!=\"OK\"}[1m])) OR sum(rate(grpc_io_server_completed_rpcs{kubernetes_namespace=\"$namespace\", app=\"$service\", grpc_server_status!=\"OK\"}[1m]))", "legendFormat": "gRPC Errors" }
          ]
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 3 },
          "id": 6,
          "title": "Latency (P95)",
          "type": "graph",
          "targets": [
            { "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{kubernetes_namespace=\"$namespace\", app=\"$service\"}[5m])) by (le)) OR histogram_quantile(0.95, sum(rate(microsoft_aspnetcore_hosting_http_server_request_duration_bucket{kubernetes_namespace=\"$namespace\", app=\"$service\"}[5m])) by (le))", "legendFormat": "HTTP P95" },
            { "expr": "histogram_quantile(0.95, sum(rate(grpc_server_handling_seconds_bucket{kubernetes_namespace=\"$namespace\", app=\"$service\"}[5m])) by (le)) OR histogram_quantile(0.95, sum(rate(grpc_io_server_server_latency_bucket{kubernetes_namespace=\"$namespace\", app=\"$service\"}[5m])) by (le))", "legendFormat": "gRPC P95" }
          ]
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 11 },
          "id": 8,
          "title": "CPU Usage (Process)",
          "type": "graph",
          "targets": [
            { "expr": "sum(rate(process_cpu_seconds_total{kubernetes_namespace=\"$namespace\", app=\"$service\"}[5m])) by (pod)", "legendFormat": "{{pod}}" }
          ]
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 11 },
          "id": 10,
          "title": "Memory Usage (Process)",
          "type": "graph",
          "targets": [
            { "expr": "sum(process_resident_memory_bytes{kubernetes_namespace=\"$namespace\", app=\"$service\"}) by (pod)", "legendFormat": "{{pod}}" }
          ]
        }
      ],
      "refresh": "5s",
      "schemaVersion": 27,
      "style": "dark",
      "tags": ["microservices"],
      "templating": {
        "list": [
          {
            "allValue": null,
            "datasource": "Prometheus",
            "definition": "label_values(up, kubernetes_namespace)",
            "hide": 0,
            "includeAll": false,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": "label_values(up, kubernetes_namespace)",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 0,
            "tagValuesQuery": "",
            "tags": [],
            "tagsQuery": "",
            "type": "query",
            "useTags": false
          },
          {
            "allValue": null,
            "datasource": "Prometheus",
            "definition": "label_values(up{kubernetes_namespace=\"$namespace\"}, app)",
            "hide": 0,
            "includeAll": false,
            "label": "Service",
            "multi": false,
            "name": "service",
            "options": [],
            "query": "label_values(up{kubernetes_namespace=\"$namespace\"}, app)",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 0,
            "tagValuesQuery": "",
            "tags": [],
            "tagsQuery": "",
            "type": "query",
            "useTags": false
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h", "2h", "1d"]
      },
      "timezone": "",
      "title": "Microservices Overview",
      "uid": "microservices-overview",
      "version": 1
    }
  infrastructure-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
            "type": "stat",
            "title": "Total Cluster CPU Cores",
            "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
            "targets": [
              {
                "expr": "count(node_cpu_seconds_total{mode=\"idle\"})",
                "legendFormat": "Cores"
              }
            ],
            "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
            "type": "stat",
            "title": "Total Cluster Memory",
            "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
            "targets": [
              {
                "expr": "sum(node_memory_MemTotal_bytes)",
                "legendFormat": "Bytes"
              }
            ],
            "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
            "type": "stat",
            "title": "Total Pods",
            "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
            "targets": [
              {
                "expr": "count(up{job=\"kubernetes-pods\"})",
                "legendFormat": "Pods"
              }
            ],
             "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "type": "graph",
          "title": "CPU Usage by Node (%)",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Memory Usage by Node",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [
             {
              "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
            "type": "graph",
            "title": "Network I/O",
            "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
            "targets": [
                { "expr": "sum(rate(node_network_receive_bytes_total[5m]))", "legendFormat": "Receive" },
                { "expr": "sum(rate(node_network_transmit_bytes_total[5m]))", "legendFormat": "Transmit" }
            ],
            "fieldConfig": { "defaults": { "unit": "bps" } }
        }
      ],
      "refresh": "5s",
      "schemaVersion": 27,
      "style": "dark",
      "tags": ["infrastructure"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h", "2h", "1d"]
      },
      "timezone": "",
      "title": "Kubernetes Infrastructure",
      "uid": "k8s-infrastructure",
      "version": 1
    }
