apiVersion: v1
kind: Service
metadata:
  name: recommendationservice
  namespace: apps
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: recommendationservice
  type: ClusterIP
  ports:
    - name: grpc
      port: 8888
      targetPort: 8888
    - name: http
      port: 8080
      targetPort: 8080
