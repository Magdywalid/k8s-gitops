apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendationservice
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendationservice
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      labels:
        app: recommendationservice
    spec:
      terminationGracePeriodSeconds: 5
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: recommendationservice
          image: magdyeldeeb/microservices-k8s:recommendationservice-1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
            - containerPort: 8080
          env:
            - name: PORT
              value: "8888"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: DISABLE_PROFILER
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 220Mi
            limits:
              cpu: 200m
              memory: 450Mi
          readinessProbe:
            grpc:
              port: 8888
          livenessProbe:
            grpc:
              port: 8888
