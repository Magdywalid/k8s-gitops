apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkoutservice
  namespace: apps
  labels:
    app: checkoutservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkoutservice
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
      labels:
        app: checkoutservice
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: checkoutservice
          image: magdyeldeeb/microservices-k8s:checkoutservice-1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
            - containerPort: 8082
          env:
            - name: PORT
              value: "5050"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"
            - name: PAYMENT_SERVICE_ADDR
              value: "paymentservice:50051"
            - name: EMAIL_SERVICE_ADDR
              value: "emailservice:8080"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"
            # Tracing disabled to prevent crash due to missing COLLECTOR_SERVICE_ADDR
            - name: ENABLE_TRACING
              value: "0"
            - name: ENABLE_PROFILER
              value: "0"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # Distroless image has no shell/nc/curl. Use tcpSocket for probes.
          livenessProbe:
            grpc:
              port: 5050
          readinessProbe:
            grpc:
              port: 5050
