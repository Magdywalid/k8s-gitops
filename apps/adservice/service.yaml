apiVersion: v1
kind: Service
metadata:
  name: adservice
  namespace: apps
  labels:
    app: adservice
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"

spec:
  selector:
    app: adservice
  type: ClusterIP
  ports:
    - name: grpc
      port: 9555
      targetPort: 9555
    - name: http
      port: 8080
      targetPort: 8080
