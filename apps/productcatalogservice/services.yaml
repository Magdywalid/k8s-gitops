apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  namespace: apps
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: productcatalogservice
  type: ClusterIP
  ports:
    - name: grpc
      port: 3550
      targetPort: 3550
    - name: http
      port: 8080
      targetPort: 8080
