apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: apps
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP # for traefik
