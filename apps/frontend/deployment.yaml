apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      labels:
        app: frontend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: ScheduleAnyway # Use 'DoNotSchedule' for strict enforcement
          labelSelector:
            matchLabels:
              app: frontend
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: frontend
          image: magdyeldeeb/microservices-k8s:frontend-1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendationservice:8888"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkoutservice:5050"
            - name: CHECKOUT_SERVICE_HTTP_ADDR
              value: "checkoutservice:8082"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"
            - name: AD_SERVICE_ADDR
              value: "adservice:9555"
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: "shoppingassistantservice:8989"
            - name: ENABLE_TRACING
              value: "0"
            - name: ENABLE_PROFILER
              value: "0"
            - name: BASE_URL
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /_healthz
              port: 8080
              httpHeaders:
                - name: "Cookie"
                  value: "shop-session-id=x-liveness-probe"
          readinessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /_healthz
              port: 8080
              httpHeaders:
                - name: "Cookie"
                  value: "shop-session-id=x-readiness-probe"
