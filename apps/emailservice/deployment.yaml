apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  namespace: apps
spec:
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
      labels:
        app: emailservice
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: emailservice
          image: magdyeldeeb/microservices-k8s:emailservice-1.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
            - containerPort: 8081
          env:
            - name: PORT
              value: "5000"
            - name: DISABLE_PROFILER
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            periodSeconds: 5
            grpc:
              port: 5000
          readinessProbe:
            periodSeconds: 5
            grpc:
              port: 5000
