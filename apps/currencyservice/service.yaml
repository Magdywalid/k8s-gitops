apiVersion: v1
kind: Service
metadata:
  name: currencyservice
  namespace: apps
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: currencyservice
  type: ClusterIP
  ports:
    - name: grpc
      port: 7000
      targetPort: 7000
    - name: http
      port: 8080
      targetPort: 8080
