apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  namespace: apps
spec:
  selector:
    matchLabels:
      app: currencyservice
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      labels:
        app: currencyservice
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: currencyservice
          image: magdyeldeeb/microservices-k8s:currencyservice-1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7000
            - containerPort: 8080
          env:
            - name: PORT
              value: "7000"
            - name: DISABLE_PROFILER
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 7000
          readinessProbe:
            grpc:
              port: 7000
